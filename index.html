  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

lue)}),\n    };\n  }\n\n  loadFont(name){\n    if(this._loaded.has(name)) return; this._loaded.add(name);\n    const l=document.createElement('link'); l.rel='stylesheet';\n    l.href='https://fonts.googleapis.com/css2?family='+name.replace(/ /g,'+')+':wght@400;700&display=swap';\n    document.head.appendChild(l);\n  }\n  applyFont(i){\n    const name=this.FONTS[i];\n    this.loadFont(name);\n    // prefetch the next couple so the swap feels instant\n    this.loadFont(this.FONTS[(i+1)%this.FONTS.length]);\n    this.loadFont(this.FONTS[(i+2)%this.FONTS.length]);\n    if(this.wmRef.current) this.wmRef.current.style.fontFamily=\"'\"+name+\"', sans-serif\";\n    if(this.fontNumRef.current) this.fontNumRef.current.textContent=String(i+1).padStart(3,'0')+' / '+this.FONTS.length;\n    if(this.fontNameRef.current) this.fontNameRef.current.textContent=name;\n    if(document.fonts&&document.fonts.load){ try{ document.fonts.load(\"700 40px '\"+name+\"'\"); }catch(e){} }\n  }\n  cycleFont(e){\n    const back = e && e.clientX < (this.wrapRef.current?this.wrapRef.current.clientWidth:window.innerWidth)/2;\n    const n=this.FONTS.length;\n    this.fontIdx = back ? (this.fontIdx-1+n)%n : (this.fontIdx+1)%n;\n    this.applyFont(this.fontIdx);\n  }\n\n  componentDidMount(){ this.ensureRunning(); }\n  componentWillUnmount(){ if(this._ro) this._ro.disconnect(); if(this._menuTimer) clearTimeout(this._menuTimer); }\n\n  // menu auto-hide: revealed on any click, hidden again after 10s of inactivity\n  revealMenu(){\n    const nav=this.navRef.current; if(!nav) return;\n    nav.style.opacity='1'; nav.style.pointerEvents='auto';\n  }\n\n  // instantly end the intro so a menu click lands on its page without waiting for the animation\n  abortIntro(){\n    const a=this.S.active||this;\n    this.S.introDone=true; this.S.phase='build'; a._sceneAlpha=1;\n    a.start = performance.now() - a.REVEAL_DUR - 100; a._buildStart = performance.now() - a.REVEAL_DUR - 100;\n    if(this.navRef.current){ this.navRef.current.style.opacity='1'; this.navRef.current.style.pointerEvents='auto'; }\n  }\n\n  // The runtime can swap logic instances without re-running componentDidMount, which would\n  // strand the rAF loop on a dead instance. So we run ONE global loop that always drives\n  // whichever instance currently owns the DOM (window.OBX.active), initialising it lazily.\n  ensureRunning(){\n    window.OBX.active = this;\n    if(!window.OBX.resizeBound){\n      window.OBX.resizeBound = true;\n      window.addEventListener('resize', ()=>{ const a=window.OBX.active; if(a&&a._inited) a.resize(); });\n    }\n    if(!window.OBX.loopStarted){\n      window.OBX.loopStarted = true;\n      const loop=(t)=>{\n        try{\n          const a=window.OBX.active;\n          if(a && a.canvasRef.current){\n            if(!a._inited){\n              a._inited = true;\n              if(!a.faces || !a.faces.length){ a.buildScene(); a.shelfFaces = a.buildShelf(); a.kallaxFaces = a.buildKallax(); a.pyrFaces = a.buildPyramid(); }\n              a.start = performance.now() - a.REVEAL_DUR - 100;   // skip the build wipe — show full forms for the flip intro\n              if(a.S.introStart===undefined){ a.S.introStart = performance.now(); a.S.introDone = false; }\n              a.initCanvas();\n              a.resize();\n            }\n            a.renderCanvas(t); a.updateHud(t);\n          }\n        }catch(e){ window.OBX.lastErr = (e&&e.stack)||String(e); }\n        requestAnimationFrame(loop);\n      };\n      requestAnimationFrame(loop);\n    }\n  }\n\n  resize(){\n    const cv=this.canvasRef.current, w=this.wrapRef.current; if(!cv||!w) return;\n    const W=w.clientWidth||window.innerWidth, H=w.clientHeight||window.innerHeight;\n    cv.width=Math.round(W*this.dpr); cv.height=Math.round(H*this.dpr);\n    this._aspect=cv.width/cv.height;\n  }\n\n  updateHud(t){\n    const p=Math.min(1,(t-this.start)/this.REVEAL_DUR);\n    const pct=Math.round(p*100);\n    if(this.pctRef.current) this.pctRef.cur s1y=dz*ux-dx*uz,s1z=dx*uy-dy*ux;let l1=Math.hypot(s1x,s1y,s1z)||1;s1x/=l1;s1y/=l1;s1z/=l1;\n      let s2x=dy*s1z-dz*s1y,s2y=dz*s1x-dx*s1z,s2z=dx*s1y-dy*s1x;\n      const cor=(p,a1,a2)=>[p[0]+s1x*a1+s2x*a2,p[1]+s1y*a1+s2y*a2,p[2]+s1z*a1+s2z*a2];\n      const A0=cor(a,-r,-r),A1=cor(a,r,-r),A2=cor(a,r,r),A3=cor(a,-r,r);\n      const B0=cor(b,-r,-r),B1=cor(b,r,-r),B2=cor(b,r,r),B3=cor(b,-r,r);\n      pushQuad(A0,A1,B1,B0,al); pushQuad(A1,A2,B2,B1,al); pushQuad(A2,A3,B3,B2,al); pushQuad(A3,A0,B0,B3,al);\n    };\n    const HALF=0.46,BEAM=0.045,POST=0.05,TOWER_Y0=0.92,TOWER_Y1=6.35;\n    // gentle 1.15° inward taper: inset = height*tan(1.15°) ≈ 0.109 over the tower\n    const HALF_TOP=HALF-(TOWER_Y1-TOWER_Y0)*Math.tan(1.15*Math.PI/180);\n    const halfAt=(y)=>HALF + (HALF_TOP-HALF)*Math.max(0,Math.min(1,(y-TOWER_Y0)/(TOWER_Y1-TOWER_Y0)));\n\n    // four main posts: angled rods, tapering inward toward the cap\n    [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([sx,sz])=>\n      rod([sx*HALF,TOWER_Y0,sz*HALF],[sx*HALF_TOP,TOWER_Y1,sz*HALF_TOP],POST,A.post));\n\n    // # base: bottom rails run straight out past every corner, orthogonal to the posts\n    {\n      const by=TOWER_Y0+0.04, OUT=0.52, EH=HALF+OUT;\n      box(0,by, HALF, EH,BEAM,BEAM,A.frame);   // front, extended both ends\n      box(0,by,-HALF, EH,BEAM,BEAM,A.frame);   // back\n      box( HALF,by,0, BEAM,BEAM,EH,A.frame);   // right\n      box(-HALF,by,0, BEAM,BEAM,EH,A.frame);   // left\n    }\n    ring(2.85,halfAt(2.85),BEAM*0.85,A.frame); // mid brace (centred in lower bay)\n    ring(4.35,halfAt(4.35),BEAM,A.frame);      // device bay floor\n    ring(5.95,halfAt(5.95),BEAM,A.frame);      // device bay ceiling\n    ring(TOWER_Y1,HALF_TOP,BEAM,A.frame);      // top frame\n    rod([0,4.35,halfAt(4.35)],[0,5.95,halfAt(5.95)],0.035,A.frame);  // front mullion, follows the taper\n\n    (function(){\n      const h=HALF_TOP+BEAM,baseY=TOWER_Y1+BEAM,ph=h*2*0.636,apex=[0,baseY+ph,0];\n      const c=[[-h,baseY,-h],[h,baseY,-h],[h s, obelisk height\n    const Y0=0.45, Y1=7.0, T=0.087, P=1.46, DZ=0.87;    // P = pitch between verticals (cube width)\n    const WX=1.5*P;                                       // outer half-width for 3 columns (4 verticals)\n    const innerW=WX-T;                                    // half-width the shelves span\n    const iy0=Y0+T, iy1=Y1-T, span=iy1-iy0, my=(iy0+iy1)/2;\n    // four full-height verticals: two sides + two dividers\n    box(-WX, (Y0+Y1)/2, 0, T, (Y1-Y0)/2, DZ, WOOD);\n    box( WX, (Y0+Y1)/2, 0, T, (Y1-Y0)/2, DZ, WOOD2);\n    box(-0.5*P, my, 0, T, span/2, DZ, EDGE);             // left divider\n    box( 0.5*P, my, 0, T, span/2, DZ, EDGE);             // right divider\n    // five horizontals (bottom, 3 dividers, top) → 4 rows\n    for(let k=0;k<=4;k++){\n      const y = (k===0)?iy0 : (k===4)?iy1 : iy0 + span*k/4;\n      box(0, y, 0, innerW, T, DZ, EDGE);\n    }\n    return faces;\n  }\n\n  // intro \"slot machine\": flip obelisk/ivar/kallax with decelerating intervals, land on obelisk\n  introState(elapsed){\n    const seq=[[0,'obx'],[100,'ivar'],[184,'pyr'],[254,'kallax'],[312,'obx'],[360,'ivar'],[404,'pyr'],[448,'kallax'],\n               [498,'obx'],[558,'ivar'],[634,'pyr'],[732,'kallax'],[858,'obx'],[1018,'ivar'],[1198,'pyr']];\n    let cur='obx';\n    for(const [tt,s] of seq){ if(elapsed>=tt) cur=s; else break; }\n    return { scene:cur, done: elapsed >= seq[seq.length-1][0] };\n  }\n\n  // ---------------- lone Giza-proportioned pyramid cap (black, for the dark flips) ----------------\n  buildPyramid(){\n    const faces=[];\n    const norm=(a,b,c)=>{const ux=b[0]-a[0],uy=b[1]-a[1],uz=b[2]-a[2],vx=c[0]-a[0],vy=c[1]-a[1],vz=c[2]-a[2];\n      let nx=uy*vz-uz*vy,ny=uz*vx-ux*vz,nz=ux*vy-uy*vx;const l=Math.hypot(nx,ny,nz)||1;return [nx/l,ny/l,nz/l];};\n    const pushTri=(a,b,c,al)=>faces.push({v:[a,b,c],n:norm(a,b,c),al});\n    const AL=[0.052,0.050,0.047];                 // near-black, like the obelisk cap\n    const hb=2.0, baseY=2.7, h=0.636*2*hb;         // Giza ratio: height = 0.636 × base; wider than the shelves\n    const apex=[0, baseY+h, 0];\n    const c=[[-hb,baseY,-hb],[hb,baseY,-hb],[hb,baseY,hb],[-hb,baseY,hb]];\n    pushTri(c[3],c[2],apex,AL); pushTri(c[1],c[0],apex,AL);\n    pushTri(c[2],c[1],apex,AL); pushTri(c[0],c[3],apex,AL);\n    return faces;\n  }\n\n  camParams(t){\n    const sway=Math.sin(t*0.00022)*0.05, bob=Math.sin(t*0.00017)*0.012;\n    return {yaw:-0.50+sway,pitch:0.085+bob,yCenter:3.95,camDist:17.0,fovy:0.55};\n  }\n  revealThreshold(t){\n    const p=Math.min(1,(t-this.start)/this.REVEAL_DUR);\n    const e=p<1?(1-Math.pow(1-p,3)):1;\n    return {y:-0.3+e*9.0,p};\n  }\n\n  // ---------------- Canvas 2D ----------------\n  initCanvas(){\n    this.ctx=this.canvasRef.current.getContext('2d');\n    this.backend='canvas';\n    if(this.badgeRef.current) this.badgeRef.current.textContent='CANVAS 2D';\n    if(this.dotRef.current){this.dotRef.current.style.background='#c9952f';this.dotRef.current.style.boxShadow='0 0 10px #c9952f';}\n  }\n  renderCanvas(t){\n    const cv=this.canvasRef.current,ctx=this.ctx; if(!cv||!ctx) return;\n    const W=cv.width,H=cv.height; ctx.clearRect(0,0,W,H);\n    const cam=this.camParams(t),thr=this.revealThreshold(t);\n    const cy=Math.cos(cam.yaw),sy=Math.sin(cam.yaw),cx=Math.cos(cam.pitch),sx=Math.sin(cam.pitch);\n    const focal=(H/2)/Math.tan(cam.fovy/2),ox=W*0.5,oy=H*0.47;\n    const rot=(p)=>{let x=p[0],y=p[1]-cam.yCenter,z=p[2];\n      let x1=cy*x-sy*z,z1=sy*x+cy*z; let y1=cx*y+sx*z1,z2=-sx*y+cx*z1; return [x1,y1,z2-cam.camDist];};\n    const rl=(p)=>{let x=p[0],y=p[1],z=p[2]; let x1=cy*x-sy*z,z1=sy*x+cy*z; let y1=cx*y+sx*z1,z2=-sx*y+cx*z1; return [x1,y1,z2];};\n    const proj=(c)=>{const f=focal/Math.max(0.05,-c[2]); return [ox+c[0]*f,oy-c[1]*f];};\n    let lw=[-0.35,0.92,0.42]; const ll=Math.hypot(...lw); lw=lw.map(v=>v/ll); const L=rl(lw);\n    const clip=(verts)=>{const T=thr.y,out=[];\n      for(let i=0;i<verts.length;i++){const a=verts[i],b=verts[(i+1)%verts.length];\n        const ain=a[1]<=T,bin=b[1]<=T; if(ain)out.push(a);\n        if(ain!==bin){const tt=(T-a[1])/(b[1]-a[1]); out.push([a[0]+(b[0]-a[0])*tt,T,a[2]+(b[2]-a[2])*tt]);}}\n      return out;};\n    // ease the obelisk<->shelf / dark<->white morph toward its hover target\n    if(this.S.shelfDirty){ this.shelfFaces = this.buildShelf(); this.S.shelfDirty = false; }\n    // intro: rapid flips (decelerating) -> fade to black -> obelisk construction build\n    if(this._sceneAlpha===undefined) this._sceneAlpha=1;\n    if(!this.S.introDone){\n      const el = t - (this.S.introStart!==undefined ? this.S.introStart : t);\n      const FLIP_END=1290, FADE=460;\n      if(el < FLIP_END){\n        const st = this.introState(el);\n        this.S.scene = st.scene;\n        // show the OBELISKEN label on the two later (slower) obelisk flips, plain like the others\n        this.S.flipLabel = (st.scene!=='obx') || (el>=480);\n        this.S.bgTarget = (st.scene==='ivar'||st.scene==='kallax') ? 1 : 0; this.S.bgT = this.S.bgTarget;\n        thr.y = 100; this._sceneAlpha = 1; this._buildStart = undefined; this.S.phase='flip';\n      } else if(el < FLIP_END+FADE){\n        this.S.scene='pyr'; this.S.bgTarget=0; this.S.bgT=0;\n        thr.y = 100; this._sceneAlpha = Math.max(0, 1-(el-FLIP_END)/FADE); this.S.phase='fade';\n      } else {\n        if(this._buildStart===undefined) this._buildStart = t;\n        this.S.scene='obx'; this.S.bgTarget=0; this.S.bgT=0; this._sceneAlpha=1; this.S.phase='build';\n        const bp=Math.min(1,(t-this._buildStart)/this.REVEAL_DUR);\n        const e=bp<1?(1-Math.pow(1-bp,3)):1; thr.y = -0.3 + e*9.0;\n        if(bp>=1){ this.S.introDone=true; this.start = t - this.REVEAL_DUR - 100; if(this.S.doneTime===undefined) this.S.doneTime=t; }\n      }\n    } else { this._sceneAlpha = 1; }\n    // wordmark: shows the label for each flip (IVAR/KALLAX/CHEOPS/OBELISKEN), fades out with the\n    // pyramid, then fades back in with the construction build\n    // (wordmark opacity is handled in one place below, after sizing)\n    // menu appears about halfway through the build, before the obelisk fully finishes\n    if(this._buildStart!==undefined && t > this._buildStart + this.REVEAL_DUR*0.5 && this.navRef.current && this.navRef.current.style.opacity!=='1'){\n      this.navRef.current.style.opacity='1';\n      this.navRef.current.style.pointerEvents='auto';\n    }\n    this.S.bgT += (this.S.bgTarget - this.S.bgT) * 0.8;\n    if(Math.abs(this.S.bgTarget - this.S.bgT) < 0.01) this.S.bgT = this.S.bgTarget;\n    const mix = this.S.bgT;\n    const lc=(a,b,m)=>[Math.round(a[0]+(b[0]-a[0])*m),Math.round(a[1]+(b[1]-a[1])*m),Math.round(a[2]+(b[2]-a[2])*m)];\n    // a blank content page (Work / CV / Contact) is just white — draw no 3D object\n    const blankPage = this.S.introDone && (this.S.page==='work' || this.S.page==='cv' || this.S.page==='contact');\n    // work page: full-bleed video (matches illd.github.io) — test3.mp4 sits beside index.html\n    const wbox=document.getElementById('obx-work');\n    if(wbox){\n      const showWork = blankPage && this.S.page==='work';\n      wbox.style.opacity = showWork ? '1' : '0';\n      const vid=document.getElementById('obx-video');\n      if(vid){ if(showWork){ if(vid.paused) vid.play().catch(()=>{}); } else if(!vid.paused){ vid.pause(); } }\n    }\n    // contact page: obfuscated email assembled at runtime (never in raw HTML)\n    const cbox=document.getElementById('obx-contact');\n    if(cbox){\n      const showContact = blankPage && this.S.page==='contact';\n      cbox.style.opacity = showContact ? '1' : '0';\n      cbox.style.pointerEvents = 'none';\n      const mail=document.getElementById('obx-mail');\n      if(showContact && !this.S.mailSet && mail){\n        const u=['tom','naerland'].join('.'); const d=['gmail','com'].join('.');\n        const addr=u+String.fromCharCode(64)+d;\n        mail.textContent=addr; mail.href='mai'+'lto:'+addr;\n        this.S.mailSet=true;\n      }\n    }\n    const cvbox=document.getElementById('obx-cv');\n    if(cvbox){\n      const showCV = blankPage && this.S.page==='cv';\n      cvbox.style.opacity = showCV ? '1' : '0';\n      cvbox.style.pointerEvents = 'none';\n      const cvmail=document.getElementById('obx-cvmail');\n      if(showCV && !this.S.cvMailSet && cvmail){\n        const u=['tom','naerland'].join('.'); const d=['gmail','com'].join('.');\n        const addr=u+String.fromCharCode(64)+d;\n        cvmail.textContent=addr; cvmail.href='mai'+'lto:'+addr;\n        this.S.cvMailSet=true;\n      }\n    }\n    const activeFaces = blankPage ? [] : (mix>0.5 ? (this.S.scene==='kallax' ? this.kallaxFaces : this.shelfFaces) : (this.S.scene==='pyr' ? this.pyrFaces : this.faces));\n    // dip canvas opacity at the midpoint so the scene swap dissolves instead of popping\n    ctx.globalAlpha = (0.3 + 0.7*Math.min(1, Math.abs(mix-0.5)*2)) * (this._sceneAlpha===undefined?1:this._sceneAlpha);\n    const strokeC = lc([202,199,194],[120,92,55],mix);\n    const draw=[];\n    let _fi=-1;\n    for(const f of activeFaces){\n      _fi++;\n      let minY=Infinity,maxY=-Infinity;\n      for(const v of f.v){if(v[1]<minY)minY=v[1];if(v[1]>maxY)maxY=v[1];}\n      if(minY>thr.y) continue;\n      let poly=f.v;\n      if(maxY>thr.y){poly=clip(f.v); if(poly.length<3) continue;}\n      const n=rl(f.n);\n      const cvp=poly.map(rot);\n      let cz=0,ccx=0,ccy=0,ccz=0;\n      for(const c of cvp){cz+=c[2];ccx+=c[0];ccy+=c[1];ccz+=c[2];}\n      const k=cvp.length; cz/=k;ccx/=k;ccy/=k;ccz/=k;\n      let tx=-ccx,ty=-ccy,tz=-ccz; const tl=Math.hypot(tx,ty,tz)||1; tx/=tl;ty/=tl;tz/=tl;\n      const facing=n[0]*tx+n[1]*ty+n[2]*tz;\n      if(facing<=0.02) continue;\n      const diff=Math.max(0,n[0]*L[0]+n[1]*L[1]+n[2]*L[2]);\n      const fres=Math.pow(1-Math.min(1,Math.max(0,facing)),3);\n      // lift ambient on the furniture so its shaded sides aren't as dark\n      const amb=(mix>0.5?0.34:0.17),key=0.95;\n      let r=f.al[0]*(amb+diff*key)+fres*0.235;\n      let g=f.al[1]*(amb+diff*key)+fres*0.230;\n      let b=f.al[2]*(amb+diff*key)+fres*0.222;\n      const band=Math.max(0,1-Math.abs(maxY-thr.y)/0.18);\n      draw.push({cz,fi:_fi,screen:cvp.map(proj),r,g,b,band});\n    }\n    // painter's sort; when two faces sit at near-equal depth, break the tie by their\n    // fixed build-order id instead of leaving it to chance — kills the sway-driven flip flicker.\n    draw.sort((a,b)=>{const d=a.cz-b.cz; return Math.abs(d)>1e-4 ? d : a.fi-b.fi;});\n    const tc=(v)=>Math.max(0,Math.min(255,Math.round(Math.pow(Math.min(1,v),0.85)*255)));\n    for(const d of draw){\n      const s=d.screen; ctx.beginPath(); ctx.moveTo(s[0][0],s[0][1]);\n      for(let i=1;i<s.length;i++) ctx.lineTo(s[i][0],s[i][1]); ctx.closePath();\n      ctx.fillStyle=`rgb(${tc(d.r)},${tc(d.g)},${tc(d.b)})`; ctx.fill();\n      ctx.lineWidth=Math.max(0.6,this.dpr*0.6);\n      ctx.strokeStyle=`rgba(${strokeC[0]},${strokeC[1]},${strokeC[2]},${0.05+d.band*0.45})`; ctx.stroke();\n    }\n    ctx.globalAlpha = 1;\n\n    // keep the wordmark in fixed proportion to the figure (scales with the obelisk, any aspect)\n    if(this.wmRef.current && this.wmBoxRef.current){\n      const top=proj(rot([0,7.05,0])), base=proj(rot([0,0.0,0]));\n      const objH=Math.abs(base[1]-top[1])/this.dpr;     // on-screen obelisk height in css px\n      const fontPx=objH*0.165;\n      const baseCss=base[1]/this.dpr;\n      this.wmRef.current.style.fontSize=fontPx.toFixed(1)+'px';\n      // screen-width guard: never let the word exceed 80% of the viewport (>=10% gap each side)\n      const maxW=(this.wrapRef.current?this.wrapRef.current.clientWidth:window.innerWidth)*0.8;\n      // size every label to the final OBELISKEN so all the flip labels match it (and fit narrow screens)\n      ctx.font=\"700 \"+fontPx+\"px 'Archivo', sans-serif\";\n      const obxW=ctx.measureText('OBELISKEN').width + 0.30*fontPx*9;\n      const finalPx = obxW>maxW ? fontPx*(maxW/obxW) : fontPx;\n      if(finalPx!==fontPx) this.wmRef.current.style.fontSize=finalPx.toFixed(1)+'px';\n      this.wmBoxRef.current.style.top=(baseCss+finalPx*0.12).toFixed(1)+'px';\n\n      // focus both the background glow and the vignette around the obelisk's screen centre,\n      // sizing radii from the obelisk's actual on-screen WIDTH and HEIGHT so the pool tracks\n      // the figure's proportions (skinny + tall), not the viewport.\n      const mid=proj(rot([0,3.5,0]));\n      const wl=proj(rot([-0.55,3.5,0])), wr=proj(rot([0.55,3.5,0]));\n      const objW=Math.abs(wr[0]-wl[0])/this.dpr;        // on-screen obelisk width in css px\n      const gx=mid[0]/this.dpr, gy=mid[1]/this.dpr;     // centre in css px\n      const rx=(objW*4.0).toFixed(0), ry=(objH*0.85).toFixed(0);   // glow radii in css px\n      const vrx=(objW*5.0).toFixed(0), vry=(objH*1.1).toFixed(0);   // vignette radii\n      // interpolate the page colours between the dark obelisk scene and the white IVAR scene\n      const g0=lc([26,25,24],[255,255,255],mix), g1=lc([16,15,14],[250,250,252],mix),\n            g2=lc([10,10,11],[242,242,245],mix), g3=lc([10,10,12],[238,240,242],mix);\n      const rgb=(c)=>`rgb(${c[0]},${c[1]},${c[2]})`;\n      if(blankPage){\n        if(this.wrapRef.current) this.wrapRef.current.style.background='#ffffff';\n        if(this.vigRef.current) this.vigRef.current.style.background='none';\n      } else {\n      if(this.wrapRef.current) this.wrapRef.current.style.background=\n        `radial-gradient(${rx}px ${ry}px at ${gx.toFixed(0)}px ${gy.toFixed(0)}px, ${rgb(g0)} 0%, ${rgb(g1)} 34%, ${rgb(g2)} 62%, ${rgb(g3)} 88%), ${rgb(g3)}`;\n      const va1=(0.28+(0.05-0.28)*mix).toFixed(3), va2=(0.5+(0.12-0.5)*mix).toFixed(3);\n      if(this.vigRef.current) this.vigRef.current.style.background=\n        `radial-gradient(${vrx}px ${vry}px at ${gx.toFixed(0)}px ${gy.toFixed(0)}px, rgba(0,0,0,0) 40%, rgba(0,0,0,${va1}) 74%, rgba(0,0,0,${va2}) 100%)`;\n      }\n\n      // wordmark: swap text + flip colour from light (on dark) to dark (on white)\n      let word='OBELISKEN';\n      if(this.S.scene==='ivar') word='IVAR'; else if(this.S.scene==='kallax') word='KALLAX'; else if(this.S.scene==='pyr') word='CHEOPS';\n      if(this.wmRef.current.textContent!==word) this.wmRef.current.textContent=word;\n      // wordmark: original light-on-dark / dark-on-white flip, with the soft blue halo on the splash\n      const wc=lc([238,240,243],[22,18,12],mix);\n      this.wmRef.current.style.color=rgb(wc);\n      this.wmRef.current.style.mixBlendMode='normal';\n      this.wmRef.current.style.textShadow = mix>0.5 ? 'none' : '0 0 38px rgba(120,150,200,.18)';\n      // wordmark: per-flip label during the intro; on the settled splash, play the scale+fade\n      // flourish exactly once (guarded), then let the animation's fill:both hold it visible.\n      this.wmRef.current.style.transition='none';\n      if(blankPage){ this.S.wmAnim=false; this.wmRef.current.style.animation='none'; this.wmRef.current.style.letterSpacing='.30em'; this.wmRef.current.style.filter='none'; this.wmRef.current.style.opacity='0'; }\n      else if(this.S.phase==='flip'){ this.S.wmAnim=false; this.wmRef.current.style.animation='none'; this.wmRef.current.style.letterSpacing='.30em'; this.wmRef.current.style.filter='none'; this.wmRef.current.style.transform='none'; this.wmRef.current.style.opacity=this.S.flipLabel?'1':'0'; }\n      else if(this.S.phase==='fade'){ this.S.wmAnim=false; this.wmRef.current.style.animation='none'; this.wmRef.current.style.opacity=String(this._sceneAlpha); }\n      else if(!this.S.wmAnim){\n        this.S.wmAnim=true;\n        this.wmRef.current.style.animation='none';\n        this.wmRef.current.style.opacity='';\n        void this.wmRef.current.offsetWidth;   // force reflow so the animation restarts cleanly\n        this.wmRef.current.style.animation='obx-wm 1.5s cubic-bezier(.16,.84,.3,1) both';\n      }\n      // nav colour follows the same flip so it stays legible on white\n      if(this.navRef.current){ this.navRef.current.style.color='#fff'; this.navRef.current.style.mixBlendMode='difference'; }\n\n      // very subtle chromatic flare: cool tint one way, warm the other, like lens fringing.\n      // screen-blend lifts colour on the dark scene; multiply tints it on the white scene.\n      if(this.flareRef.current){\n        if(blankPage){ this.flareRef.current.style.background='none'; }\n        else {\n        const I=this.state.fInt, SP=this.state.fSpread, SE=this.state.fSep;\n        const cool=(objW*2.2*SP), warm=(objW*2.6*SP);\n        const ca=(0.05*I).toFixed(3), wa=(0.045*I).toFixed(3);\n        this.flareRef.current.style.mixBlendMode = mix>0.5 ? 'multiply' : 'screen';\n        this.flareRef.current.style.background=\n          `radial-gradient(${cool.toFixed(0)}px ${(objH*0.5*SP).toFixed(0)}px at ${(gx-objW*0.5*SE).toFixed(0)}px ${(gy-objH*0.18*SE).toFixed(0)}px, rgba(70,96,150,${ca}) 0%, rgba(70,96,150,0) 70%),`+\n          `radial-gradient(${warm.toFixed(0)}px ${(objH*0.55*SP).toFixed(0)}px at ${(gx+objW*0.6*SE).toFixed(0)}px ${(gy+objH*0.22*SE).toFixed(0)}px, rgba(168,120,72,${wa}) 0%, rgba(168,120,72,0) 72%)`;\n        }\n      }\n\n    }\n  }\n\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
